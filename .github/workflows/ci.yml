name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Check whitespace
        run: git diff --check
